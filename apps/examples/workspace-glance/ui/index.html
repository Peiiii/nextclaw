<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workspace Glance</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(146, 216, 255, 0.3), transparent 30%),
          linear-gradient(160deg, #eef6fb 0%, #fdfcf7 48%, #edf3e9 100%);
        color: #0f2740;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        box-sizing: border-box;
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      .panel {
        backdrop-filter: blur(18px);
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid rgba(15, 39, 64, 0.1);
        border-radius: 24px;
        box-shadow: 0 18px 48px rgba(15, 39, 64, 0.12);
        padding: 28px;
      }

      h1 {
        font-size: clamp(32px, 6vw, 54px);
        line-height: 1;
        margin: 0 0 12px;
      }

      p {
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: #0f2740;
        color: #fff;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
      }

      dl {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin: 24px 0 0;
      }

      dt {
        font-size: 12px;
        color: #52708d;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      dd {
        margin: 6px 0 0;
        font-size: 24px;
        font-weight: 600;
      }

      pre {
        margin-top: 20px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(15, 39, 64, 0.08);
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <p>NextClaw Workspace App</p>
        <h1 id="title">Loading...</h1>
        <p id="description"></p>
        <button id="run-button" type="button">Glance Workspace</button>
        <dl>
          <div>
            <dt>Action</dt>
            <dd id="action">-</dd>
          </div>
          <div>
            <dt>Documents</dt>
            <dd id="document-count">-</dd>
          </div>
          <div>
            <dt>Text Bytes</dt>
            <dd id="text-bytes">-</dd>
          </div>
          <div>
            <dt>Wasm Score</dt>
            <dd id="wasm-score">-</dd>
          </div>
        </dl>
        <pre id="details"></pre>
      </section>
    </main>
    <script type="module" src="./workspace-glance.controller.js"></script>
  </body>
</html>
