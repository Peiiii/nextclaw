server {
    listen 80;
    listen [::]:80;
    server_name docs.nextclaw.net;

    root /var/www/docs.nextclaw.net;
    index index.html;

    access_log /var/log/nginx/docs.nextclaw.net.access.log;
    error_log /var/log/nginx/docs.nextclaw.net.error.log;

    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store";
        add_header X-NextClaw-Docs-Mirror "domestic";
        return 200 '{"ok":true,"service":"nextclaw-docs-mirror"}';
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-NextClaw-Docs-Mirror "domestic";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "public, max-age=60";
        add_header X-NextClaw-Docs-Mirror "domestic";
    }
}
