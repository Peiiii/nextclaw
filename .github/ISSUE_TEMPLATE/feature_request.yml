name: Feature Request
description: Propose a new capability or improvement.
title: "[Feature] "
labels:
  - type: feature
  - status: needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user pain or business problem should this solve?
      placeholder: "When ..., users cannot ..., which causes ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What exactly should we build?
      placeholder: Describe the desired behavior and key interactions.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other options were considered?
      placeholder: List alternatives and why they are weaker.
    validations:
      required: false
  - type: dropdown
    id: impact
    attributes:
      label: Expected Impact
      description: How much impact do you expect?
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define verifiable conditions of done.
      placeholder: |
        - [ ] Given ..., when ..., then ...
        - [ ] CLI/API/UI behavior is documented
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: What this request explicitly does not include.
      placeholder: Boundaries to avoid scope creep.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I included acceptance criteria that can be verified.
          required: true
