name: desktop-validate

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/nextclaw/**"
      - "packages/nextclaw-ui/**"
      - "packages/nextclaw-server/**"
      - "packages/nextclaw-openclaw-compat/**"
      - "packages/nextclaw-core/**"
      - "packages/nextclaw-runtime/**"
      - "packages/ncp-packages/**"
      - "packages/extensions/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "scripts/**"
      - ".github/workflows/desktop-validate.yml"
  push:
    branches:
      - master
      - main
    paths:
      - "apps/desktop/**"
      - "packages/nextclaw/**"
      - "packages/nextclaw-ui/**"
      - "packages/nextclaw-server/**"
      - "packages/nextclaw-openclaw-compat/**"
      - "packages/nextclaw-core/**"
      - "packages/nextclaw-runtime/**"
      - "packages/ncp-packages/**"
      - "packages/extensions/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "scripts/**"
      - ".github/workflows/desktop-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-runtime-smoke:
    name: desktop-runtime-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint / Typecheck / Runtime Smoke
        run: |
          pnpm -r --filter @nextclaw/desktop... build
          pnpm -C apps/desktop lint
          pnpm -C apps/desktop tsc
          pnpm -C apps/desktop smoke

  desktop-macos-dmg-install-smoke:
    name: desktop-macos-dmg-install-smoke
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Build macOS DMG
        run: |
          set -euo pipefail
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          pnpm -r --filter @nextclaw/desktop... build
          pnpm -C apps/desktop lint
          pnpm -C apps/desktop tsc
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --mac dmg --arm64 --publish never

      - name: Smoke test macOS DMG install
        run: |
          set -euo pipefail
          DMG_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "${DMG_PATH}" ]; then
            echo "macOS dmg not found in apps/desktop/release"
            exit 1
          fi
          apps/desktop/scripts/smoke-macos-dmg.sh "${DMG_PATH}" 120

      - name: Upload macOS smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-validate-smoke-logs-macos-arm64
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/nextclaw-desktop-smoke-home/logs/**
            ${{ runner.temp }}/nextclaw-desktop-smoke-logs/**
            ~/Library/Logs/NextClaw Desktop/**

      - name: Upload macOS DMG artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-validate-macos-arm64
          if-no-files-found: warn
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/*.blockmap

  desktop-windows-exe-smoke:
    name: desktop-windows-exe-smoke
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build desktop runtime dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pnpm -r --filter @nextclaw/desktop... build

      - name: Build Windows desktop executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          pnpm -C apps/desktop lint
          pnpm -C apps/desktop tsc
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --win dir --x64 --publish never

      - name: Smoke test Windows desktop executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "apps/desktop/release/win-unpacked/NextClaw Desktop.exe")) {
            throw "Windows desktop executable not found in apps/desktop/release/win-unpacked"
          }
          $desktopExe = (Resolve-Path "apps/desktop/release/win-unpacked/NextClaw Desktop.exe").Path
          & "apps/desktop/scripts/smoke-windows-desktop.ps1" -DesktopExePath $desktopExe -StartupTimeoutSec 120

      - name: Upload Windows smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-validate-smoke-logs-win32-x64
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/nextclaw-desktop-smoke-home/logs/**
            ~\AppData\Roaming\NextClaw Desktop\logs\**

      - name: Upload Windows desktop executable artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-validate-win32-x64-unpacked
          if-no-files-found: warn
          path: |
            apps/desktop/release/win-unpacked/**

  desktop-linux-package-smoke:
    name: desktop-linux-package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm -r --filter @nextclaw/desktop... build

      - name: Build Linux AppImage + deb
        shell: bash
        run: |
          set -euo pipefail
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          pnpm -C apps/desktop lint
          pnpm -C apps/desktop tsc
          pnpm -C apps/desktop build:main
          pnpm -C apps/desktop exec electron-builder --linux AppImage deb --x64 --publish never

      - name: Normalize Linux artifact filenames
        shell: bash
        run: |
          set -euo pipefail
          bash apps/desktop/scripts/normalize-linux-release-artifacts.sh apps/desktop/release

      - name: Smoke test Linux AppImage
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name 'NextClaw.Desktop-*-linux-x64.AppImage' | head -n 1)"
          if [ -z "${APPIMAGE_PATH}" ]; then
            echo "Linux AppImage not found in apps/desktop/release"
            exit 1
          fi
          apps/desktop/scripts/smoke-linux-appimage.sh "${APPIMAGE_PATH}" 120

      - name: Smoke test Linux deb install
        shell: bash
        run: |
          set -euo pipefail
          DEB_PATH="$(find apps/desktop/release -maxdepth 1 -type f -name 'nextclaw-desktop_*.deb' | head -n 1)"
          if [ -z "${DEB_PATH}" ]; then
            echo "Linux deb not found in apps/desktop/release"
            exit 1
          fi
          bash apps/desktop/scripts/smoke-linux-deb.sh "${DEB_PATH}"

      - name: Build test-signed Linux APT repo
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-linux-apt-repo.mjs --input-dir apps/desktop/release --output-dir dist/linux-apt-repo --signing-mode test

      - name: Smoke test Linux APT repo install
        shell: bash
        run: |
          set -euo pipefail
          bash apps/desktop/scripts/smoke-linux-apt-repo.sh dist/linux-apt-repo/apt

      - name: Upload Linux smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-validate-smoke-logs-linux-x64
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/nextclaw-desktop-smoke-home/logs/**
            ${{ runner.temp }}/nextclaw-desktop-smoke-logs/**

      - name: Upload Linux package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-validate-linux-x64-packages
          if-no-files-found: warn
          path: |
            apps/desktop/release/NextClaw.Desktop-*-linux-x64.AppImage
            apps/desktop/release/NextClaw.Desktop-*-linux-x64.AppImage.blockmap
            apps/desktop/release/nextclaw-desktop_*.deb
            dist/linux-apt-repo/**
